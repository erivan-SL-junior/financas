services:
  mysql:
    image: postgres:16
    container_name: postgres-server
    environment:
      POSTGRES_DB: financas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d

volumes:
  postgres_data: